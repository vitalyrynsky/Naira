<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naira Emotions</title>
  <style>
    :root {
      --page: #ffffff;
      --ink: #0e1624;
      --text: #111111;
      --muted: #6c7384;
      --panel: #ffffff;
      --panel-border: rgba(14, 22, 36, 0.08);
      --panel-shadow: 0 14px 32px rgba(14, 22, 36, 0.08);
      --panel-shadow-active: 0 20px 38px rgba(14, 22, 36, 0.14);
      --focus: rgba(86, 62, 214, 0.42);
      --glow: rgba(128, 128, 255, 0.52);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
      padding: 24px 16px 20px;
    }

    .hero {
      width: 100%;
      flex: 1 0 auto;
      display: grid;
      place-items: center;
      min-height: min(66vh, 620px);
    }

    .stage {
      position: relative;
      width: min(54vmin, 372px);
      min-width: 240px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .character {
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      --blink: 1;
      position: relative;
      width: 100%;
      height: 100%;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: default;
      transform: perspective(900px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
      transition: transform 180ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .character:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 12px;
      border-radius: 32px;
    }

    .spark {
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0 14%, transparent 66%);
      opacity: .7;
      transform: scale(.82);
      filter: blur(22px);
      z-index: -1;
      transition: background 260ms ease;
      animation: pulse 3s ease-in-out infinite;
    }

    .logo {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 24px 42px rgba(33, 24, 80, 0.14));
      transition: opacity 320ms ease;
    }

    .hex-layer {
      transition: opacity 260ms ease;
    }

    .face {
      fill: var(--ink);
    }

    .marks {
      transform-box: fill-box;
      transform-origin: center center;
      transform: scaleY(var(--blink));
      transition: transform 120ms ease;
    }

    .intro-sequence {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 320ms ease;
    }

    .intro-sequence.is-visible {
      opacity: 1;
    }

    .intro-sequence.is-hiding {
      opacity: 0;
    }

    .intro-sequence > svg {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 24px 42px rgba(33, 24, 80, 0.14));
    }

    .character[data-intro="active"] .logo,
    .character[data-intro="active"] .spark {
      opacity: 0;
    }

    body.is-intro-active .selector {
      opacity: .58;
      pointer-events: none;
    }

    .selector {
      width: min(960px, 100%);
      display: flex;
      justify-content: center;
    }

    .emotion-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
    }

    .emotion-chip {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 14px 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--panel-shadow);
      color: var(--text);
      cursor: pointer;
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        border-color 160ms ease,
        background 160ms ease;
    }

    .emotion-chip:hover {
      transform: translateY(-2px);
      box-shadow: var(--panel-shadow-active);
    }

    .emotion-chip:focus-visible {
      outline: 3px solid var(--chip-focus, var(--focus));
      outline-offset: 3px;
    }

    .emotion-chip[aria-pressed="true"] {
      box-shadow: var(--panel-shadow-active);
      border-color: var(--chip-border, rgba(86, 62, 214, 0.22));
      background: var(--chip-bg, rgba(86, 62, 214, 0.06));
    }

    .emotion-chip__icon {
      width: 80px;
      height: 80px;
      display: grid;
      place-items: center;
    }

    .emotion-chip__icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .emotion-chip__label {
      font-size: 15px;
      line-height: 1.15;
      font-weight: 500;
      letter-spacing: -.01em;
      text-align: center;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(.82);
        opacity: .54;
      }

      50% {
        transform: scale(1);
        opacity: .82;
      }
    }

    @media (max-width: 760px) {
      .page {
        justify-content: flex-start;
        gap: 20px;
        padding-top: 20px;
      }

      .hero {
        min-height: auto;
      }

      .stage {
        width: min(78vw, 340px);
      }

      .emotion-grid {
        grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
        gap: 10px;
      }

      .emotion-chip {
        padding: 12px 8px 10px;
        border-radius: 20px;
      }

      .emotion-chip__icon {
        width: 68px;
        height: 68px;
      }

      .emotion-chip__label {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .character,
      .spark,
      .emotion-chip,
      .hex-layer,
      .marks {
        animation: none;
        transition-duration: 1ms;
      }
    }
  </style>
</head>

    const character = document.querySelector('.character');
    const spark = document.querySelector('.spark');
    const logo = document.querySelector('.logo');
    const hexLayers = [document.querySelector('#hex-a'), document.querySelector('#hex-b')];
    const facePath = document.querySelector('#face-path');
    const markPaths = [document.querySelector('#mark-a'), document.querySelector('#mark-b')];
    const emotionGrid = document.querySelector('#emotion-grid');
    const introSequence = document.querySelector('#intro-sequence');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

    const emotionOrder = ['sleep', 'waiting', 'welcome', 'warning', 'sorry', 'working'];
    const lookNames = ['left', 'straight', 'right'];
    const lookToValue = { left: -1, straight: 0, right: 1 };

    let selectedEmotion = 'waiting';
    let targetLookPosition = 0;
    let currentLookPosition = 0;
    let currentFacePoints = null;
    let currentMarkPoints = [null, null];
    let frameId = 0;
    let activeHexIndex = 0;
    let activeFillId = RAW_EMOTIONS[selectedEmotion].fillId;
    let introFinished = false;
    let blinkStarted = false;

    const clonePoints = (points) => points.map(([x, y]) => [x, y]);

    const samplePath = (d, samples = 84) => {
      const sampler = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      sampler.setAttribute('d', d);
      sampler.setAttribute('visibility', 'hidden');
      logo.appendChild(sampler);

      const length = sampler.getTotalLength();
      const points = [];
      for (let index = 0; index < samples; index += 1) {
        const point = sampler.getPointAtLength((index / samples) * length);
        points.push([point.x, point.y]);
      }

      sampler.remove();
      return points;
    };

    const toPolygonPath = (points) => {
      const [first, ...rest] = points;
      const path = [`M${first[0].toFixed(3)} ${first[1].toFixed(3)}`];
      for (const [x, y] of rest) {
        path.push(`L${x.toFixed(3)} ${y.toFixed(3)}`);
      }
      path.push('Z');
      return path.join('');
    };

    const lerpPoints = (fromPoints, toPoints, amount) =>
      fromPoints.map(([fx, fy], index) => [
        fx + (toPoints[index][0] - fx) * amount,
        fy + (toPoints[index][1] - fy) * amount
      ]);

    const distanceSum = (fromPoints, toPoints) => {
      let total = 0;
      for (let index = 0; index < fromPoints.length; index += 1) {
        const [fx, fy] = fromPoints[index];
        const [tx, ty] = toPoints[index];
        total += Math.hypot(tx - fx, ty - fy);
      }
      return total;
    };

    const rotatePoints = (points, shift) => {
      const size = points.length;
      return points.map((_, index) => points[(index + shift + size) % size]);
    };

    const reversePoints = (points) => {
      const [first, ...rest] = points;
      return [first, ...rest.reverse()];
    };

    const alignPoints = (referencePoints, candidatePoints) => {
      let best = candidatePoints;
      let bestDistance = Number.POSITIVE_INFINITY;
      const variants = [candidatePoints, reversePoints(candidatePoints)];

      for (const variant of variants) {
        for (let shift = 0; shift < variant.length; shift += 1) {
          const rotated = rotatePoints(variant, shift);
          const total = distanceSum(referencePoints, rotated);
          if (total < bestDistance) {
            bestDistance = total;
            best = rotated;
          }
        }
      }

      return clonePoints(best);
    };

    const centroid = (points) => {
      let x = 0;
      let y = 0;
      for (const [px, py] of points) {
        x += px;
        y += py;
      }
      return [x / points.length, y / points.length];
    };

    const anchorPoints = (points) => {
      const [cx, cy] = centroid(points);
      let bestIndex = 0;
      let bestScore = Number.POSITIVE_INFINITY;

      for (let index = 0; index < points.length; index += 1) {
        const [px, py] = points[index];
        const angle = Math.atan2(py - cy, px - cx);
        const angleDistance = Math.abs(angle + Math.PI / 2);
        const radiusDistance = Math.hypot(px - cx, py - cy);
        const score = angleDistance * 1000 + radiusDistance;

        if (score < bestScore) {
          bestScore = score;
          bestIndex = index;
        }
      }

      return rotatePoints(points, bestIndex);
    };

    const settlePoints = (currentPoints, targetPoints, factor = 0.2, epsilon = 0.02) => {
      let settled = true;
      const nextPoints = currentPoints.map(([x, y], index) => {
        const [tx, ty] = targetPoints[index];
        const nextX = x + (tx - x) * factor;
        const nextY = y + (ty - y) * factor;
        if (Math.abs(tx - nextX) > epsilon || Math.abs(ty - nextY) > epsilon) {
          settled = false;
        }
        return [nextX, nextY];
      });
      return [settled ? clonePoints(targetPoints) : nextPoints, settled];
    };

    const createEmotionSamples = () => {
      const result = {};
      for (const [emotionKey, emotion] of Object.entries(RAW_EMOTIONS)) {
        const sampledLooks = {};
        for (const lookName of lookNames) {
          const look = emotion.looks[lookName];
          const marks = [look.marks[0] || EMPTY_PATH, look.marks[1] || EMPTY_PATH];
          sampledLooks[lookName] = {
            face: anchorPoints(samplePath(look.face, 96)),
            marks: [
              anchorPoints(samplePath(marks[0], 64)),
              anchorPoints(samplePath(marks[1], 64))
            ],
            previewMarks: marks
          };
        }

        const faceReference = sampledLooks.straight.face;
        const markReferences = sampledLooks.straight.marks;

        for (const lookName of ['left', 'right']) {
          sampledLooks[lookName].face = alignPoints(faceReference, sampledLooks[lookName].face);
          sampledLooks[lookName].marks = sampledLooks[lookName].marks.map((markPoints, index) =>
            alignPoints(markReferences[index], markPoints)
          );
        }

        result[emotionKey] = {
          label: emotion.label,
          fillId: emotion.fillId,
          blinkable: emotion.blinkable,
          looks: sampledLooks
        };
      }
      return result;
    };

    const EMOTIONS = createEmotionSamples();

    const setHexFill = (fillId, immediate = false) => {
      if (fillId === activeFillId && !immediate) {
        return;
      }
      const incoming = immediate ? 0 : 1 - activeHexIndex;
      hexLayers[incoming].setAttribute('fill', FILL_PRESETS[fillId].fill);
      if (immediate) {
        hexLayers[0].style.opacity = '1';
        hexLayers[1].style.opacity = '0';
        activeHexIndex = 0;
      } else {
        hexLayers[incoming].style.opacity = '1';
        hexLayers[activeHexIndex].style.opacity = '0';
        activeHexIndex = incoming;
      }
      activeFillId = fillId;
      spark.style.setProperty('--glow', FILL_PRESETS[fillId].glow);
    };

    const desiredState = (emotionKey, lookPosition) => {
      const emotion = EMOTIONS[emotionKey];
      if (lookPosition <= 0) {
        const amount = lookPosition + 1;
        return {
          fillId: emotion.fillId,
          blinkable: emotion.blinkable,
          face: lerpPoints(emotion.looks.left.face, emotion.looks.straight.face, amount),
          marks: [
            lerpPoints(emotion.looks.left.marks[0], emotion.looks.straight.marks[0], amount),
            lerpPoints(emotion.looks.left.marks[1], emotion.looks.straight.marks[1], amount)
          ]
        };
      }

      return {
        fillId: emotion.fillId,
        blinkable: emotion.blinkable,
        face: lerpPoints(emotion.looks.straight.face, emotion.looks.right.face, lookPosition),
        marks: [
          lerpPoints(emotion.looks.straight.marks[0], emotion.looks.right.marks[0], lookPosition),
          lerpPoints(emotion.looks.straight.marks[1], emotion.looks.right.marks[1], lookPosition)
        ]
      };
    };

    const setLookDataset = () => {
      if (currentLookPosition < -0.34) {
        character.dataset.look = 'left';
      } else if (currentLookPosition > 0.34) {
        character.dataset.look = 'right';
      } else {
        character.dataset.look = 'straight';
      }
    };

    const applyGeometry = (state, immediate = false) => {
      setHexFill(state.fillId, immediate);

      if (immediate || !currentFacePoints) {
        currentFacePoints = clonePoints(state.face);
        currentMarkPoints = [clonePoints(state.marks[0]), clonePoints(state.marks[1])];
        facePath.setAttribute('d', toPolygonPath(currentFacePoints));
        markPaths[0].setAttribute('d', toPolygonPath(currentMarkPoints[0]));
        markPaths[1].setAttribute('d', toPolygonPath(currentMarkPoints[1]));
        return true;
      }

      const faceTarget = alignPoints(currentFacePoints, state.face);
      const markTargets = [
        alignPoints(currentMarkPoints[0], state.marks[0]),
        alignPoints(currentMarkPoints[1], state.marks[1])
      ];

      const [nextFace, faceSettled] = settlePoints(currentFacePoints, faceTarget);
      const [nextMarkA, markASettled] = settlePoints(currentMarkPoints[0], markTargets[0]);
      const [nextMarkB, markBSettled] = settlePoints(currentMarkPoints[1], markTargets[1]);

      currentFacePoints = nextFace;
      currentMarkPoints = [nextMarkA, nextMarkB];

      facePath.setAttribute('d', toPolygonPath(currentFacePoints));
      markPaths[0].setAttribute('d', toPolygonPath(currentMarkPoints[0]));
      markPaths[1].setAttribute('d', toPolygonPath(currentMarkPoints[1]));

      return faceSettled && markASettled && markBSettled;
    };

    const requestFrame = () => {
      if (!frameId) {
        frameId = window.requestAnimationFrame(step);
      }
    };

    const step = () => {
      frameId = 0;
      const motionReduced = reducedMotion.matches;
      const lookFactor = motionReduced ? 1 : 0.18;
      const delta = targetLookPosition - currentLookPosition;

      if (Math.abs(delta) > 0.001) {
        currentLookPosition += delta * lookFactor;
      } else {
        currentLookPosition = targetLookPosition;
      }

      const settled = applyGeometry(desiredState(selectedEmotion, currentLookPosition), motionReduced);
      setLookDataset();

      if (!settled || Math.abs(targetLookPosition - currentLookPosition) > 0.001) {
        requestFrame();
      }
    };

    const selectEmotion = (emotionKey) => {
      if (!introFinished) {
        return;
      }
      if (emotionKey === selectedEmotion) {
        return;

      selectedEmotion = emotionKey;
      syncSelector();
      character.dataset.emotion = emotionKey;
      character.style.setProperty('--blink', '1');
      requestFrame();

        button.setAttribute('aria-pressed', String(button.dataset.emotion === selectedEmotion));

            <linearGradient id="${previewId}" x1="54.8282" y1="169.838" x2="137.25" y2="23.9999" gradientUnits="userSpaceOnUse">
              <stop stop-color="${fillPreset.preview.from}"></stop>

          <path fill="#0E1624" d="${look.face}"></path>
          ${look.marks.map((mark) => `<path fill="white" d="${mark}"></path>`).join('')}

      `;
    };

      emotionGrid.innerHTML = '';

        button.innerHTML = `
          <span class="emotion-chip__icon">${previewSvg(emotionKey)}</span>
          <span class="emotion-chip__label">${emotion.label}</span>
        `;
        button.addEventListener('click', () => selectEmotion(emotionKey));
        emotionGrid.appendChild(button);
      }
    };

    const pointerToLook = (clientX, bounds) => {
      const centerX = bounds.left + bounds.width / 2;
      return Math.max(-1, Math.min(1, (clientX - centerX) / (bounds.width * 0.48)));
    };

    const setIntroFrame = (markup) => {
      introSequence.innerHTML = markup;
    };

    const introMorphMarkup = () => `
      <svg class="intro-morph" viewBox="0 0 192 192" aria-hidden="true">
        <defs>
          <linearGradient id="intro-grad-purple-blue" x1="54.8282" y1="169.838" x2="137.25" y2="23.9999" gradientUnits="userSpaceOnUse">
            <stop stop-color="#B27FE8"></stop>
            <stop offset="1" stop-color="#8080FF"></stop>
          </linearGradient>
        </defs>
        <g id="intro-hex-shape" opacity="0" transform="translate(96 96) scale(.9) translate(-96 -96)">
          <path fill="url(#intro-grad-purple-blue)" d="${HEX_PATH}"></path>
        </g>
        <path id="intro-face-path" fill="#0E1624" d=""></path>
        <g id="intro-eyes" opacity="0">
          <path id="intro-eye-a" fill="white" d="${INTRO_EYE_PATHS[0]}"></path>
          <path id="intro-eye-b" fill="white" d="${INTRO_EYE_PATHS[1]}"></path>
        </g>
      </svg>
    `;

    const interpolateIntroSamples = (samples, progress) => {
      const clamped = Math.max(0, Math.min(1, progress));
      const scaled = clamped * (samples.length - 1);
      const index = Math.min(samples.length - 2, Math.floor(scaled));
      const amount = scaled - index;
      return lerpPoints(samples[index], samples[index + 1], amount);
    };

    const buildIntroFaceSamples = () => {
      const sampled = INTRO_FACE_PATHS.map((path) => anchorPoints(samplePath(path, 96)));
      for (let index = 1; index < sampled.length; index += 1) {
        sampled[index] = alignPoints(sampled[index - 1], sampled[index]);
      }
      return sampled;
    };

    const animateIntroMorph = (onComplete) => {
      setIntroFrame(introMorphMarkup());
      const introHex = introSequence.querySelector('#intro-hex-shape');
      const introFace = introSequence.querySelector('#intro-face-path');
      const introEyes = introSequence.querySelector('#intro-eyes');
      const samples = buildIntroFaceSamples();
      const duration = 1900;
      const startedAt = performance.now();

      const tick = (now) => {
        const rawProgress = Math.min(1, (now - startedAt) / duration);
        const hexProgress = Math.min(1, rawProgress / .34);
        const easedHex = 1 - Math.pow(1 - hexProgress, 3);
        introHex.setAttribute('opacity', String(easedHex));
        introHex.setAttribute('transform', `translate(96 96) scale(${.9 + easedHex * .1}) translate(-96 -96)`);

        const faceRawProgress = Math.max(0, Math.min(1, (rawProgress - .5) / .5));
        if (faceRawProgress <= .16) {
          introFace.setAttribute('d', EMPTY_PATH);
          introFace.setAttribute('opacity', '0');
        } else {
          const easedProgress = faceRawProgress < .5
            ? 4 * faceRawProgress * faceRawProgress * faceRawProgress
            : 1 - Math.pow(-2 * faceRawProgress + 2, 3) / 2;
          introFace.setAttribute('d', toPolygonPath(interpolateIntroSamples(samples, easedProgress)));
          introFace.setAttribute('opacity', String(Math.min(1, (faceRawProgress - .16) / .18)));
        }

        const eyesProgress = Math.max(0, Math.min(1, (rawProgress - .88) / .1));
        introEyes.setAttribute('opacity', String(eyesProgress));

        if (rawProgress < 1) {
          window.requestAnimationFrame(tick);
          return;
        }

        introFace.setAttribute('d', INTRO_FACE_PATHS[INTRO_FACE_PATHS.length - 1]);
        introEyes.setAttribute('opacity', '1');
        window.setTimeout(onComplete, 170);
      };

      window.requestAnimationFrame(tick);
    };

    const startBlinkLoop = () => {
      if (!blinkStarted) {
        blinkStarted = true;
        window.setTimeout(blinkLoop, 1400);
      }
    };

    const finishIntro = () => {
      introFinished = true;
      document.body.classList.remove('is-intro-active');
      character.dataset.intro = 'done';
      introSequence.classList.add('is-hiding');
      window.setTimeout(() => {
        introSequence.remove();
      }, 320);
      startBlinkLoop();
    };

    const playIntro = () => {
      currentLookPosition = 1;
      targetLookPosition = 1;
      applyGeometry(desiredState(selectedEmotion, currentLookPosition), true);
      setLookDataset();

      if (reducedMotion.matches) {
        finishIntro();
        return;
      }

      document.body.classList.add('is-intro-active');
      character.dataset.intro = 'active';
      introSequence.classList.add('is-visible');
      animateIntroMorph(finishIntro);
    };

    window.addEventListener('pointermove', (event) => {
      if (!introFinished) {
        return;
      }
      const bounds = character.getBoundingClientRect();
      const dx = pointerToLook(event.clientX, bounds);
      const centerY = bounds.top + bounds.height / 2;
      const dy = Math.max(-1, Math.min(1, (event.clientY - centerY) / (bounds.height * 0.48)));
      targetLookPosition = dx;
      character.style.setProperty('--tilt-y', `${(dx * 3.4).toFixed(2)}deg`);
      character.style.setProperty('--tilt-x', `${(-dy * 3.4).toFixed(2)}deg`);
      requestFrame();
    }, { passive: true });

    window.addEventListener('pointerleave', () => {
      if (!introFinished) {
        return;
      }
      targetLookPosition = 0;
      character.style.setProperty('--tilt-y', '0deg');
      character.style.setProperty('--tilt-x', '0deg');
      requestFrame();
    });

    const blink = () => {
      if (!RAW_EMOTIONS[selectedEmotion].blinkable || reducedMotion.matches) {
        character.style.setProperty('--blink', '1');
        return;
      }
      character.style.setProperty('--blink', '.08');
      window.setTimeout(() => {
        character.style.setProperty('--blink', '1');
      }, 120);
    };

    const blinkLoop = () => {
      blink();
      window.setTimeout(blinkLoop, 1900 + Math.random() * 2600);
    };

    renderSelector();
    syncSelector();
    character.dataset.emotion = selectedEmotion;
    playIntro();
  </script>
</body>
</html>
